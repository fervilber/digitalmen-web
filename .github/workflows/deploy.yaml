name: Deploy Quartz
on:
  push:
    branches:
      - main
  repository_dispatch:
    types: [trigger-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Quartz Engine
        uses: actions/checkout@v4

      - name: Checkout Content (digitalmen)
        uses: actions/checkout@v4
        with:
          repository: fervilber/digitalmen
          path: temp_content
          token: ${{ secrets.PAT_TOKEN }}

      - name: Filter and Prepare Content
        run: |
          mkdir -p content
          if [ -f temp_content/index.md ]; then
            cp temp_content/index.md content/
          fi
          if [ -d temp_content/wiki ]; then
            cp -r temp_content/wiki content/
          fi


      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

